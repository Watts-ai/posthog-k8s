name: Release

on:
  push:
    branches: [main]
    paths:
      - 'images/clickhouse/**'
      - 'helm/posthog/**'
      - 'build.sh'
      - '.github/workflows/release.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract chart version
        id: versions
        run: |
          VERSION=$(grep '^version:' helm/posthog/Chart.yaml | awk '{print $2}')
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "owner=${OWNER}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      # Build + push ClickHouse image
      - name: Build ClickHouse image
        run: |
          REGISTRY=${{ env.REGISTRY }}/${{ steps.versions.outputs.owner }} ./build.sh
          docker push ${{ env.REGISTRY }}/${{ steps.versions.outputs.owner }}/posthog-clickhouse:${{ steps.versions.outputs.version }}
          docker push ${{ env.REGISTRY }}/${{ steps.versions.outputs.owner }}/posthog-clickhouse:latest

      # Package + push Helm chart
      - name: Push Helm chart
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          helm package helm/posthog
          helm push posthog-${{ steps.versions.outputs.version }}.tgz oci://${{ env.REGISTRY }}/${{ steps.versions.outputs.owner }}
