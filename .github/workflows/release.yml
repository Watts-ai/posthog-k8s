name: Release

on:
  push:
    branches: [main]
    paths:
      - 'images/clickhouse/**'
      - 'helm/posthog/**'
      - 'build.sh'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract versions from Chart.yaml
        id: versions
        run: |
          VERSION=$(grep '^version:' helm/posthog/Chart.yaml | awk '{print $2}')
          APP_VERSION=$(grep '^appVersion:' helm/posthog/Chart.yaml | awk '{print $2}' | tr -d '"')
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"
          echo "minor=${MINOR}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      # Build + push ClickHouse image
      - name: Build ClickHouse image
        run: |
          REGISTRY=${{ env.REGISTRY }}/${{ github.repository_owner }} ./build.sh
          docker push ${{ env.REGISTRY }}/${{ github.repository_owner }}/posthog-clickhouse:${{ steps.versions.outputs.version }}-${{ steps.versions.outputs.app_version }}
          docker push ${{ env.REGISTRY }}/${{ github.repository_owner }}/posthog-clickhouse:latest

      # Package + push Helm chart
      - name: Push Helm chart
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          helm package helm/posthog

          # Push exact version (0.1.0)
          helm push posthog-${{ steps.versions.outputs.version }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}

          # Push minor tag (0.1)
          cp posthog-${{ steps.versions.outputs.version }}.tgz posthog-${{ steps.versions.outputs.minor }}.tgz
          # OCI tags are set by the Chart.yaml version, so we sed it for the alias tags
          # Push minor tag (0.1)
          mkdir -p /tmp/chart-minor
          tar -xzf posthog-${{ steps.versions.outputs.version }}.tgz -C /tmp/chart-minor
          sed -i "s/^version:.*/version: ${{ steps.versions.outputs.minor }}/" /tmp/chart-minor/posthog/Chart.yaml
          helm package /tmp/chart-minor/posthog -d /tmp
          helm push /tmp/posthog-${{ steps.versions.outputs.minor }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}

          # Push major tag (0)
          mkdir -p /tmp/chart-major
          tar -xzf posthog-${{ steps.versions.outputs.version }}.tgz -C /tmp/chart-major
          sed -i "s/^version:.*/version: ${{ steps.versions.outputs.major }}/" /tmp/chart-major/posthog/Chart.yaml
          helm package /tmp/chart-major/posthog -d /tmp
          helm push /tmp/posthog-${{ steps.versions.outputs.major }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}
