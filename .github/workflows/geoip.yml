name: GeoIP

on:
  push:
    branches: [main]
    paths:
      - 'images/geoip/**'
      - '.github/workflows/geoip.yml'
  schedule:
    # MaxMind updates GeoLite2-City twice per week (Tuesdays and Fridays).
    # Rebuild on those days after their release window.
    - cron: '0 12 * * 2,5'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push GeoIP image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          TAG=$(date -u +%Y%m%d)
          IMAGE=${{ env.REGISTRY }}/${OWNER}/posthog-geoip

          docker build -t ${IMAGE}:${TAG} -t ${IMAGE}:latest images/geoip/
          docker push ${IMAGE}:${TAG}
          docker push ${IMAGE}:latest
