# Domain and TLS
domain: posthog.example.com
siteUrl: ""  # defaults to https://<domain>, override for http testing
secureCookies: true  # set false when not behind TLS

# Secrets
# - create: true → chart auto-generates a Secret with crypto-secure random values
# - create: false → chart expects the Secret to already exist (e.g. via ExternalSecrets)
# Secret keys: posthog-secret, encryption-salt-keys
secrets:
  create: true
  name: ""  # override Secret name (default: <fullname>-secrets)

# Image repositories and tags
# Every image is pinned. Override any repository/tag for airgapped registries.
# To upgrade: update tags here and bump Chart version.
images:
  posthog:
    repository: ghcr.io/watts-ai/posthog/posthog
    tag: watts-4cf0a85e1f61c22c60a12a87149ac00185eaf103
  posthogNode:
    repository: posthog/posthog-node
    tag: 30c8ab7fe262baa51c639565ebbd0041280ef989
  clickhouse:
    repository: ghcr.io/watts-ai/posthog-clickhouse
    # tag defaults to <chartVersion>-<appVersion> via _helpers.tpl
  capture:
    repository: ghcr.io/posthog/posthog/capture
    tag: sha-ae8c37f
  featureFlags:
    repository: ghcr.io/posthog/posthog/feature-flags
    tag: sha-06bb98c
  propertyDefsRs:
    repository: ghcr.io/posthog/posthog/property-defs-rs
    tag: sha-babbe33
  cyclotronJanitor:
    repository: ghcr.io/posthog/posthog/cyclotron-janitor
    tag: sha-b238b34
  cymbal:
    repository: ghcr.io/posthog/posthog/cymbal
    tag: sha-fd4b210
  livestream:
    repository: ghcr.io/posthog/posthog/livestream
    tag: sha-77fc873
  geoip:
    repository: ghcr.io/watts-ai/posthog-geoip
    tag: latest
  # Infrastructure (pinned versions, not tied to appVersion)
  postgres:
    repository: postgres
    tag: 15.12-alpine
  redis:
    repository: redis
    tag: 7.2-alpine
  zookeeper:
    repository: zookeeper
    tag: "3.7.0"
  kafka:
    repository: docker.redpanda.com/redpandadata/redpanda
    tag: v25.1.9
  seaweedfs:
    repository: chrislusf/seaweedfs
    tag: "4.03"
  elasticsearch:
    repository: elasticsearch
    tag: 7.17.28
  temporal:
    repository: temporalio/auto-setup
    tag: "1.26.2"
  temporalAdminTools:
    repository: temporalio/admin-tools
    tag: "1.26.2"
  temporalUi:
    repository: temporalio/ui
    tag: "2.47.2"

# SSO / Social Auth
# Enable each provider and provide credentials via the Secret resource
# Secret keys: github-oauth-key, github-oauth-secret, gitlab-oauth-key, etc.
sso:
  github:
    enabled: false
  gitlab:
    enabled: false
    apiUrl: "https://gitlab.com"
  google:
    enabled: false
  oidc:
    enabled: false
    endpoint: ""  # e.g. https://accounts.google.com
    iconUrl: ""       # URL to a custom icon for the OIDC login button
    displayName: ""   # custom label for the OIDC button (default: "OpenID Connect")

# Email (also configurable via PostHog UI at /instance/settings)
email:
  enabled: false
  host: ""
  port: 587
  user: ""
  password: ""
  useTls: true
  useSsl: false
  defaultFrom: ""

# Authentication controls
auth:
  disablePasswordLogin: false
  disablePasskeyLogin: false

# Slack integration (also configurable via PostHog UI)
slack:
  clientId: ""
  clientSecret: ""
  signingSecret: ""

# Multi-tenancy
multiOrgEnabled: false

# Security / Proxy
allowedIpBlocks: ""
trustedProxies: ""
trustAllProxies: false
allowedHosts: "*"

# App tokens (for installing private plugins/apps)
# Provide via Secret keys: github-token, gitlab-token, npm-token
appTokens:
  github: false
  gitlab: false
  npm: false

# Feature flags cache
teamNegativeCacheCapacity: 10000
teamNegativeCacheTtlSeconds: 300

# ClickHouse tuning
debugQueries: false
clickhouseDisableExternalSchemas: false

# Materialized columns
materializeColumnsAnalysisPeriodHours: 168
materializeColumnsBackfillPeriodDays: 90
materializeColumnsMaxAtOnce: 10
materializeColumnsMinimumQueryTime: 3000
materializeColumnsScheduleCron: "0 5 * * SAT"

# Misc
disablePaidFeatureShowcasing: false
captureInternalMetrics: false
asyncEventActionMapping: false
actionEventMappingIntervalSeconds: 300
clearClickhouseRemovedDataScheduleCron: "0 5 * * SAT"
logLevel: "info"
skipServiceVersionRequirements: false
jsUrl: ""  # URL for loading frontend assets; leave empty for default

kafkaUrlForClickhouse: ""   # ClickHouse-specific Kafka address; falls back to main Kafka

# StatsD metrics
statsd:
  host: ""
  port: 8125
  prefix: ""

# Bot/fraud detection
workosRadar:
  enabled: false
  apiKey: ""

# Signup CAPTCHA
cloudflareTurnstile:
  siteKey: ""
  secretKey: ""

# Set to an RFC3339 timestamp to control session recording metadata switchover
# e.g. "2026-04-20T00:00:00Z". Leave empty to omit.
sessionRecordingV2MetadataSwitchover: ""

# =============================================================================
# Infrastructure services — internal (chart-managed) or external (bring your own)
# =============================================================================

# PostgreSQL
postgres:
  type: internal  # "internal" = deploy StatefulSet, "external" = bring your own
  external:
    host: ""
    port: 5432
    sslMode: ""      # require, verify-ca, verify-full
    sslCa: ""        # path to CA cert inside container
    sslCert: ""      # path to client cert
    sslKey: ""       # path to client key
  persistence:
    size: 10Gi
    storageClass: ""

# Redis
redis:
  type: internal
  external:
    url: ""          # e.g. redis://my-redis:6379/ or rediss://... for TLS
  persistence:
    size: 2Gi
    storageClass: ""

# ClickHouse
clickhouse:
  type: internal
  external:
    host: ""
    httpPort: 8123
    nativePort: 9000
    secure: false
    verify: false
  persistence:
    size: 20Gi
    storageClass: ""

# Kafka (Redpanda)
kafka:
  type: internal
  external:
    hosts: ""        # e.g. my-kafka:9092
  persistence:
    size: 10Gi
    storageClass: ""

# Object storage (S3-compatible)
objectStorage:
  type: internal     # "internal" = deploy SeaweedFS, "external" = bring your own S3
  external:
    endpoint: ""     # e.g. https://s3.amazonaws.com
    region: ""
    bucket: posthog

# ZooKeeper (used by ClickHouse)
zookeeper:
  persistence:
    size: 1Gi
    storageClass: ""

# Elasticsearch (used by Temporal)
elasticsearch:
  persistence:
    size: 5Gi
    storageClass: ""

# SeaweedFS persistence (only when objectStorage.type=internal)
seaweedfs:
  persistence:
    size: 10Gi
    storageClass: ""

# =============================================================================
# Optional features
# =============================================================================

geoip:
  enabled: true
  # GeoIP database is baked into the posthog-geoip image at build time.
  # This avoids runtime downloads, which is required for air-gapped
  # deployments and prevents startup failures if the CDN is unreachable.

# Node scheduling (for dedicated node groups with taints)
tolerations: []
nodeSelector: {}

# Telemetry
optOutCapture: true

# Ingress
ingress:
  enabled: true
  className: ""
  annotations: {}
  tls: []
