apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "posthog.fullname" . }}-livestream
  labels:
    {{- include "posthog.labels" . | nindent 4 }}
    {{- include "posthog.selectorLabels" (dict "context" . "component" "livestream") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "posthog.selectorLabels" (dict "context" . "component" "livestream") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-livestream.yaml") . | sha256sum }}
      labels:
        {{- include "posthog.labels" . | nindent 8 }}
        {{- include "posthog.selectorLabels" (dict "context" . "component" "livestream") | nindent 8 }}
    spec:
      {{- include "posthog.scheduling" . | nindent 6 }}
      containers:
        - name: livestream
          image: {{ include "posthog.rustImage" (dict "repo" .Values.images.livestream.repository "tag" (.Values.images.livestream.tag)) }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: LIVESTREAM_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "posthog.secretName" . }}
                  key: posthog-secret
          volumeMounts:
            - name: livestream-config
              mountPath: /configs/configs.yml
              subPath: configs.yml
      volumes:
        - name: livestream-config
          configMap:
            name: {{ include "posthog.fullname" . }}-livestream
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "posthog.fullname" . }}-livestream
  labels:
    {{- include "posthog.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      name: http
  selector:
    {{- include "posthog.selectorLabels" (dict "context" . "component" "livestream") | nindent 4 }}
