apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "posthog.fullname" . }}-feature-flags
  labels:
    {{- include "posthog.labels" . | nindent 4 }}
    {{- include "posthog.selectorLabels" (dict "context" . "component" "feature-flags") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "posthog.selectorLabels" (dict "context" . "component" "feature-flags") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "posthog.labels" . | nindent 8 }}
        {{- include "posthog.selectorLabels" (dict "context" . "component" "feature-flags") | nindent 8 }}
    spec:
      {{- include "posthog.scheduling" . | nindent 6 }}
      containers:
        - name: feature-flags
          image: {{ include "posthog.rustImage" (dict "repo" .Values.images.featureFlags.repository "tag" (.Values.images.featureFlags.tag)) }}
          ports:
            - containerPort: 3001
              name: http
          readinessProbe:
            httpGet:
              path: /_readiness
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
          env:
            - name: WRITE_DATABASE_URL
              value: postgres://posthog:posthog@{{ include "posthog.fullname" . }}-db:5432/posthog
            - name: READ_DATABASE_URL
              value: postgres://posthog:posthog@{{ include "posthog.fullname" . }}-db:5432/posthog
            - name: PERSONS_WRITE_DATABASE_URL
              value: postgres://posthog:posthog@{{ include "posthog.fullname" . }}-db:5432/posthog
            - name: PERSONS_READ_DATABASE_URL
              value: postgres://posthog:posthog@{{ include "posthog.fullname" . }}-db:5432/posthog
            - name: REDIS_URL
              value: redis://{{ include "posthog.fullname" . }}-redis:6379/
            - name: ADDRESS
              value: "0.0.0.0:3001"
            - name: RUST_LOG
              value: info
            - name: COOKIELESS_REDIS_HOST
              value: {{ include "posthog.fullname" . }}-redis
            - name: COOKIELESS_REDIS_PORT
              value: "6379"
            {{- if .Values.geoip.enabled }}
            - name: MAXMIND_DB_PATH
              value: /share/GeoLite2-City.mmdb
            {{- end }}
          {{- if .Values.geoip.enabled }}
          volumeMounts:
            - name: geoip
              mountPath: /share
          {{- end }}
      {{- if .Values.geoip.enabled }}
      volumes:
        - name: geoip
          persistentVolumeClaim:
            claimName: {{ include "posthog.fullname" . }}-geoip
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "posthog.fullname" . }}-feature-flags
  labels:
    {{- include "posthog.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: http
      name: http
  selector:
    {{- include "posthog.selectorLabels" (dict "context" . "component" "feature-flags") | nindent 4 }}
