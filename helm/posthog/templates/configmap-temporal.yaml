apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "posthog.fullname" . }}-temporal-dynamicconfig
  labels:
    {{- include "posthog.labels" . | nindent 4 }}
data:
  development-sql.yaml: |
    limit.maxIDLength:
      - value: 255
        constraints: {}
    system.forceSearchAttributesCacheRefreshOnRead:
      - value: true
        constraints: {}
    system.visibilityDisableOrderByClause:
      - value: false
        constraints: {}
