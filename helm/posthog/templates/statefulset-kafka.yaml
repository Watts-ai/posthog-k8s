{{- if eq .Values.kafka.type "internal" }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "posthog.fullname" . }}-kafka
  labels:
    {{- include "posthog.labels" . | nindent 4 }}
    {{- include "posthog.selectorLabels" (dict "context" . "component" "kafka") | nindent 4 }}
spec:
  replicas: 1
  serviceName: {{ include "posthog.fullname" . }}-kafka
  selector:
    matchLabels:
      {{- include "posthog.selectorLabels" (dict "context" . "component" "kafka") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "posthog.labels" . | nindent 8 }}
        {{- include "posthog.selectorLabels" (dict "context" . "component" "kafka") | nindent 8 }}
    spec:
      {{- include "posthog.scheduling" . | nindent 6 }}
      securityContext:
        fsGroup: 101
        runAsUser: 101
      containers:
        - name: kafka
          image: {{ include "posthog.infraImage" .Values.images.kafka }}
          args:
            - redpanda
            - start
            - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
            - --advertise-kafka-addr internal://{{ include "posthog.fullname" . }}-kafka:9092,external://localhost:19092
            - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
            - --advertise-pandaproxy-addr internal://{{ include "posthog.fullname" . }}-kafka:8082,external://localhost:18082
            - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
            - --rpc-addr {{ include "posthog.fullname" . }}-kafka:33145
            - --advertise-rpc-addr {{ include "posthog.fullname" . }}-kafka:33145
            - --mode dev-container
            - --smp 2
            - --memory 3G
            - --reserve-memory 500M
            - --overprovisioned
            - --set redpanda.empty_seed_starts_cluster=false
            - --seeds {{ include "posthog.fullname" . }}-kafka:33145
            - --set redpanda.auto_create_topics_enabled=true
          ports:
            - name: kafka
              containerPort: 9092
            - name: admin
              containerPort: 9644
          env:
            - name: ALLOW_PLAINTEXT_LISTENER
              value: "true"
            - name: KAFKA_LOG_RETENTION_MS
              value: "3600000"
            - name: KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS
              value: "300000"
            - name: KAFKA_LOG_RETENTION_HOURS
              value: "1"
          readinessProbe:
            exec:
              command: ["sh", "-c", "curl -f http://localhost:9644/v1/status/ready"]
            initialDelaySeconds: 10
            periodSeconds: 3
            timeoutSeconds: 10
            failureThreshold: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "curl -f http://localhost:9644/v1/status/ready"]
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/redpanda/data
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        {{- include "posthog.pvcSpec" (dict "size" .Values.kafka.persistence.size "storageClass" .Values.kafka.persistence.storageClass) | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "posthog.fullname" . }}-kafka
  labels:
    {{- include "posthog.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: kafka
      port: 9092
      targetPort: kafka
    - name: admin
      port: 9644
      targetPort: admin
  selector:
    {{- include "posthog.selectorLabels" (dict "context" . "component" "kafka") | nindent 4 }}
{{- end }}
