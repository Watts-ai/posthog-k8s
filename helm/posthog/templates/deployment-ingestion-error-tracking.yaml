apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "posthog.fullname" . }}-ingestion-error-tracking
  labels:
    {{- include "posthog.labels" . | nindent 4 }}
    {{- include "posthog.selectorLabels" (dict "context" . "component" "ingestion-error-tracking") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "posthog.selectorLabels" (dict "context" . "component" "ingestion-error-tracking") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "posthog.labels" . | nindent 8 }}
        {{- include "posthog.selectorLabels" (dict "context" . "component" "ingestion-error-tracking") | nindent 8 }}
    spec:
      {{- include "posthog.scheduling" . | nindent 6 }}
      containers:
        - name: ingestion-error-tracking
          image: {{ include "posthog.nodeImage" . }}
          command: ["node", "nodejs/dist/index.js"]
          env:
            {{- include "posthog.commonEnv" . | nindent 12 }}
            - name: PLUGIN_SERVER_MODE
              value: ingestion-errortracking
            - name: PERSONS_DATABASE_URL
              value: postgres://posthog:posthog@{{ include "posthog.fullname" . }}-db:5432/posthog
            - name: CDP_REDIS_HOST
              value: {{ include "posthog.fullname" . }}-redis
