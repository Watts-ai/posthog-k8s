{{- if eq .Values.objectStorage.type "internal" }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "posthog.fullname" . }}-seaweedfs
  labels:
    {{- include "posthog.labels" . | nindent 4 }}
    {{- include "posthog.selectorLabels" (dict "context" . "component" "seaweedfs") | nindent 4 }}
spec:
  replicas: 1
  serviceName: {{ include "posthog.fullname" . }}-seaweedfs
  selector:
    matchLabels:
      {{- include "posthog.selectorLabels" (dict "context" . "component" "seaweedfs") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "posthog.labels" . | nindent 8 }}
        {{- include "posthog.selectorLabels" (dict "context" . "component" "seaweedfs") | nindent 8 }}
    spec:
      {{- include "posthog.scheduling" . | nindent 6 }}
      containers:
        - name: seaweedfs
          image: {{ include "posthog.infraImage" .Values.images.seaweedfs }}
          env:
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "posthog.secretName" . }}
                  key: s3-access-key-id
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "posthog.secretName" . }}
                  key: s3-secret-access-key
          command:
            - /bin/sh
            - -c
            - |
              cat > /tmp/s3.json <<CONF
              {"identities":[{"name":"posthog","credentials":[{"accessKey":"${S3_ACCESS_KEY}","secretKey":"${S3_SECRET_KEY}"}],"actions":["Admin","Read","Write"]}]}
              CONF
              /usr/bin/weed server -s3 -s3.port=8333 -s3.config=/tmp/s3.json -dir=/data &
              WEED_PID=$!
              echo "Waiting for SeaweedFS to initialize..."
              while true; do
                  sleep 5
                  echo "Checking if posthog bucket exists..."
                  if echo "s3.bucket.list" | /usr/bin/weed shell -master=localhost:9333 2>&1 | grep -q "posthog"; then
                      echo "Bucket posthog exists!"
                      break
                  fi
                  echo "Bucket not found, attempting to create..."
                  echo "s3.bucket.create -name posthog" | /usr/bin/weed shell -master=localhost:9333 2>&1 || true
                  echo "Retrying in 5s..."
              done
              echo "SeaweedFS ready with posthog bucket"
              wait $WEED_PID
          ports:
            - name: s3
              containerPort: 8333
            - name: master
              containerPort: 9333
          readinessProbe:
            exec:
              command: ["sh", "-c", "echo 's3.bucket.list' | /usr/bin/weed shell -master=localhost:9333 2>&1 | grep -q posthog"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 30
          livenessProbe:
            exec:
              command: ["sh", "-c", "echo 's3.bucket.list' | /usr/bin/weed shell -master=localhost:9333 2>&1 | grep -q posthog"]
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: seaweedfs
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: seaweedfs
      spec:
        {{- include "posthog.pvcSpec" (dict "size" .Values.seaweedfs.persistence.size "storageClass" .Values.seaweedfs.persistence.storageClass) | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "posthog.fullname" . }}-seaweedfs
  labels:
    {{- include "posthog.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: s3
      port: 8333
      targetPort: s3
    - name: master
      port: 9333
      targetPort: master
  selector:
    {{- include "posthog.selectorLabels" (dict "context" . "component" "seaweedfs") | nindent 4 }}
{{- end }}
