apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "posthog.fullname" . }}-worker
  labels:
    {{- include "posthog.labels" . | nindent 4 }}
    {{- include "posthog.selectorLabels" (dict "context" . "component" "worker") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "posthog.selectorLabels" (dict "context" . "component" "worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "posthog.labels" . | nindent 8 }}
        {{- include "posthog.selectorLabels" (dict "context" . "component" "worker") | nindent 8 }}
    spec:
      {{- include "posthog.scheduling" . | nindent 6 }}
      initContainers:
        - name: wait-for-web
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for web to be ready (migrations must complete first)..."
              until wget -q --spider http://{{ include "posthog.fullname" . }}-web:8000/_health 2>/dev/null; do sleep 5; done
              echo "Web is ready"
      containers:
        - name: worker
          image: {{ include "posthog.image" . }}
          command: ["./bin/docker-worker-celery", "--with-scheduler"]
          env:
            {{- include "posthog.commonEnv" . | nindent 12 }}
            - name: RECORDING_API_URL
              value: http://{{ include "posthog.fullname" . }}-recording-api:6738
            - name: CDP_API_URL
              value: http://{{ include "posthog.fullname" . }}-plugins:6738
            - name: FLAGS_REDIS_ENABLED
              value: "false"
            - name: POSTHOG_SKIP_MIGRATION_CHECKS
              value: "1"
            - name: SKIP_ASYNC_MIGRATIONS_SETUP
              value: "1"
