apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "posthog.fullname" . }}-elasticsearch
  labels:
    {{- include "posthog.labels" . | nindent 4 }}
    {{- include "posthog.selectorLabels" (dict "context" . "component" "elasticsearch") | nindent 4 }}
spec:
  replicas: 1
  serviceName: {{ include "posthog.fullname" . }}-elasticsearch
  selector:
    matchLabels:
      {{- include "posthog.selectorLabels" (dict "context" . "component" "elasticsearch") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "posthog.labels" . | nindent 8 }}
        {{- include "posthog.selectorLabels" (dict "context" . "component" "elasticsearch") | nindent 8 }}
    spec:
      containers:
        - name: elasticsearch
          image: {{ include "posthog.infraImage" .Values.images.elasticsearch }}
          ports:
            - name: http
              containerPort: 9200
          env:
            - name: cluster.routing.allocation.disk.threshold_enabled
              value: "true"
            - name: cluster.routing.allocation.disk.watermark.low
              value: 512mb
            - name: cluster.routing.allocation.disk.watermark.high
              value: 256mb
            - name: cluster.routing.allocation.disk.watermark.flood_stage
              value: 128mb
            - name: discovery.type
              value: single-node
            - name: ES_JAVA_OPTS
              value: "-Xms256m -Xmx256m"
            - name: xpack.security.enabled
              value: "false"
          readinessProbe:
            exec:
              command: ["sh", "-c", "curl -s http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30
          volumeMounts:
            - name: elasticsearch-data
              mountPath: /var/lib/elasticsearch/data
  volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        {{- include "posthog.pvcSpec" (dict "size" .Values.elasticsearch.persistence.size "storageClass" .Values.elasticsearch.persistence.storageClass) | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "posthog.fullname" . }}-elasticsearch
  labels:
    {{- include "posthog.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9200
      targetPort: http
  selector:
    {{- include "posthog.selectorLabels" (dict "context" . "component" "elasticsearch") | nindent 4 }}
