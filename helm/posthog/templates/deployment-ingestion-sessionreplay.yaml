apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "posthog.fullname" . }}-ingestion-sessionreplay
  labels:
    {{- include "posthog.labels" . | nindent 4 }}
    {{- include "posthog.selectorLabels" (dict "context" . "component" "ingestion-sessionreplay") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "posthog.selectorLabels" (dict "context" . "component" "ingestion-sessionreplay") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "posthog.labels" . | nindent 8 }}
        {{- include "posthog.selectorLabels" (dict "context" . "component" "ingestion-sessionreplay") | nindent 8 }}
    spec:
      {{- include "posthog.scheduling" . | nindent 6 }}
      containers:
        - name: ingestion-sessionreplay
          image: {{ include "posthog.nodeImage" . }}
          command: ["node", "nodejs/dist/index.js"]
          env:
            {{- include "posthog.commonEnv" . | nindent 12 }}
            - name: PLUGIN_SERVER_MODE
              value: recordings-blob-ingestion-v2
            - name: SESSION_RECORDING_V2_S3_TIMEOUT_MS
              value: "120000"
