{{- if .Values.secrets.create }}
{{- $name := include "posthog.secretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "posthog.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- if and $existing $existing.data (index $existing.data "posthog-secret") }}
  posthog-secret: {{ index $existing.data "posthog-secret" }}
  {{- else }}
  posthog-secret: {{ randAlphaNum 56 | b64enc }}
  {{- end }}
  {{- if and $existing $existing.data (index $existing.data "encryption-salt-keys") }}
  encryption-salt-keys: {{ index $existing.data "encryption-salt-keys" }}
  {{- else }}
  encryption-salt-keys: {{ randAlphaNum 32 | b64enc }}
  {{- end }}
  {{- if and $existing $existing.data (index $existing.data "postgres-password") }}
  postgres-password: {{ index $existing.data "postgres-password" }}
  {{- else }}
  postgres-password: {{ randAlphaNum 32 | b64enc }}
  {{- end }}
  {{- if and $existing $existing.data (index $existing.data "clickhouse-api-password") }}
  clickhouse-api-password: {{ index $existing.data "clickhouse-api-password" }}
  {{- else }}
  clickhouse-api-password: {{ randAlphaNum 32 | b64enc }}
  {{- end }}
  {{- if and $existing $existing.data (index $existing.data "clickhouse-app-password") }}
  clickhouse-app-password: {{ index $existing.data "clickhouse-app-password" }}
  {{- else }}
  clickhouse-app-password: {{ randAlphaNum 32 | b64enc }}
  {{- end }}
  {{- if and $existing $existing.data (index $existing.data "s3-access-key-id") }}
  s3-access-key-id: {{ index $existing.data "s3-access-key-id" }}
  {{- else }}
  s3-access-key-id: {{ randAlphaNum 20 | b64enc }}
  {{- end }}
  {{- if and $existing $existing.data (index $existing.data "s3-secret-access-key") }}
  s3-secret-access-key: {{ index $existing.data "s3-secret-access-key" }}
  {{- else }}
  s3-secret-access-key: {{ randAlphaNum 40 | b64enc }}
  {{- end }}
{{- end }}
