apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "posthog.fullname" . }}-cyclotron-janitor
  labels:
    {{- include "posthog.labels" . | nindent 4 }}
    {{- include "posthog.selectorLabels" (dict "context" . "component" "cyclotron-janitor") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "posthog.selectorLabels" (dict "context" . "component" "cyclotron-janitor") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "posthog.labels" . | nindent 8 }}
        {{- include "posthog.selectorLabels" (dict "context" . "component" "cyclotron-janitor") | nindent 8 }}
    spec:
      containers:
        - name: cyclotron-janitor
          image: {{ include "posthog.rustImage" (dict "repo" .Values.images.cyclotronJanitor.repository "tag" (.Values.images.cyclotronJanitor.tag | default .Chart.AppVersion)) }}
          env:
            - name: DATABASE_URL
              value: postgres://posthog:posthog@{{ include "posthog.fullname" . }}-db:5432/cyclotron
            - name: KAFKA_HOSTS
              value: {{ include "posthog.fullname" . }}-kafka:9092
