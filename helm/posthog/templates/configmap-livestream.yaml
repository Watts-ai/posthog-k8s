apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "posthog.fullname" . }}-livestream
  labels:
    {{- include "posthog.labels" . | nindent 4 }}
data:
  configs.yml: |
    debug: false
    consumers:
      event:
        enabled: true
        brokers: '{{ include "posthog.fullname" . }}-kafka:9092'
        topic: 'events_plugin_ingestion'
        security_protocol: 'PLAINTEXT'
        group_id: 'livestream'
      session_recording:
        enabled: true
        brokers: '{{ include "posthog.fullname" . }}-kafka:9092'
        topic: 'session_recording_snapshot_item_events'
        security_protocol: 'PLAINTEXT'
        group_id: 'livestream-session-recordings'
      notification:
        enabled: false
