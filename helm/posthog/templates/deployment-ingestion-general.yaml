apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "posthog.fullname" . }}-ingestion-general
  labels:
    {{- include "posthog.labels" . | nindent 4 }}
    {{- include "posthog.selectorLabels" (dict "context" . "component" "ingestion-general") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "posthog.selectorLabels" (dict "context" . "component" "ingestion-general") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "posthog.labels" . | nindent 8 }}
        {{- include "posthog.selectorLabels" (dict "context" . "component" "ingestion-general") | nindent 8 }}
    spec:
      {{- include "posthog.scheduling" . | nindent 6 }}
      containers:
        - name: ingestion-general
          image: {{ include "posthog.nodeImage" . }}
          command: ["node", "nodejs/dist/index.js"]
          env:
            {{- include "posthog.commonEnv" . | nindent 12 }}
            - name: PLUGIN_SERVER_MODE
              value: ingestion-v2-combined
            - name: PERSONS_DATABASE_URL
              value: postgres://posthog:$(PGPASSWORD)@{{ include "posthog.fullname" . }}-db:5432/posthog
            - name: BEHAVIORAL_COHORTS_DATABASE_URL
              value: postgres://posthog:$(PGPASSWORD)@{{ include "posthog.fullname" . }}-db:5432/posthog
            - name: COOKIELESS_REDIS_HOST
              value: {{ include "posthog.fullname" . }}-redis
            - name: COOKIELESS_REDIS_PORT
              value: "6379"
            - name: CDP_REDIS_HOST
              value: {{ include "posthog.fullname" . }}-redis
