apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "posthog.fullname" . }}-property-defs-rs
  labels:
    {{- include "posthog.labels" . | nindent 4 }}
    {{- include "posthog.selectorLabels" (dict "context" . "component" "property-defs-rs") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "posthog.selectorLabels" (dict "context" . "component" "property-defs-rs") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "posthog.labels" . | nindent 8 }}
        {{- include "posthog.selectorLabels" (dict "context" . "component" "property-defs-rs") | nindent 8 }}
    spec:
      containers:
        - name: property-defs-rs
          image: {{ include "posthog.rustImage" (dict "repo" .Values.images.propertyDefsRs.repository "tag" (.Values.images.propertyDefsRs.tag)) }}
          env:
            - name: DATABASE_URL
              value: postgres://posthog:posthog@{{ include "posthog.fullname" . }}-db:5432/posthog
            - name: KAFKA_HOSTS
              value: {{ include "posthog.fullname" . }}-kafka:9092
            - name: SKIP_WRITES
              value: "false"
            - name: SKIP_READS
              value: "false"
            - name: FILTER_MODE
              value: opt-out
