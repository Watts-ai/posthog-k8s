#
# PostHog self-hosted — standalone Docker Compose
# Mirrors upstream hobby deployment (docker-compose.hobby.yml + docker-compose.base.yml)
# without requiring the PostHog installer or Caddy proxy.
#
# Usage:
#   1. cp .env.example .env && edit .env
#   2. docker compose build
#   3. docker compose up -d
#   4. Wait ~5-10 min for migrations, then visit http://localhost:8000
#

x-logging: &default-logging
    driver: json-file
    options:
        max-size: '50m'
        max-file: '3'

services:
    # =========================================================================
    # Infrastructure
    # =========================================================================

    db:
        image: postgres:15.12-alpine
        restart: on-failure
        logging: *default-logging
        environment:
            POSTGRES_USER: posthog
            POSTGRES_DB: posthog
            POSTGRES_PASSWORD: posthog
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U posthog']
            interval: 5s
            timeout: 30s
            retries: 30
            start_period: 10s
        volumes:
            - ./posthog/docker/postgres-init-scripts:/docker-entrypoint-initdb.d
            - postgres-data:/var/lib/postgresql/data

    redis7:
        image: redis:7.2-alpine
        restart: on-failure
        logging: *default-logging
        command: redis-server --maxmemory-policy allkeys-lru --maxmemory 200mb
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 3s
            timeout: 10s
            retries: 10
        volumes:
            - redis7-data:/data

    clickhouse:
        build:
            context: .
            dockerfile: images/clickhouse/Dockerfile
        image: posthog-clickhouse:local
        restart: on-failure
        logging: *default-logging
        environment:
            CLICKHOUSE_SKIP_USER_SETUP: 1
            KAFKA_HOSTS: 'kafka:9092'
        healthcheck:
            test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1']
            interval: 3s
            timeout: 10s
            retries: 10
        depends_on:
            - kafka
            - zookeeper
        volumes:
            - clickhouse-data:/var/lib/clickhouse

    zookeeper:
        image: zookeeper:3.7.0
        restart: on-failure
        logging: *default-logging
        volumes:
            - zookeeper-datalog:/datalog
            - zookeeper-data:/data
            - zookeeper-logs:/logs

    kafka:
        image: docker.redpanda.com/redpandadata/redpanda:v25.1.9
        restart: on-failure
        logging: *default-logging
        command:
            - redpanda
            - start
            - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
            - --advertise-kafka-addr internal://kafka:9092,external://localhost:19092
            - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
            - --advertise-pandaproxy-addr internal://kafka:8082,external://localhost:18082
            - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
            - --rpc-addr kafka:33145
            - --advertise-rpc-addr kafka:33145
            - --mode dev-container
            - --smp 2
            - --memory 3G
            - --reserve-memory 500M
            - --overprovisioned
            - --set redpanda.empty_seed_starts_cluster=false
            - --seeds kafka:33145
            - --set redpanda.auto_create_topics_enabled=true
        environment:
            ALLOW_PLAINTEXT_LISTENER: 'true'
            KAFKA_LOG_RETENTION_MS: 3600000
            KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
            KAFKA_LOG_RETENTION_HOURS: 1
        healthcheck:
            test: curl -f http://localhost:9644/v1/status/ready || exit 1
            interval: 3s
            timeout: 10s
            retries: 10
        depends_on:
            - zookeeper
        volumes:
            - kafka-data:/var/lib/redpanda/data

    objectstorage:
        image: minio/minio:RELEASE.2025-04-22T22-12-26Z
        restart: on-failure
        logging: *default-logging
        environment:
            MINIO_ROOT_USER: object_storage_root_user
            MINIO_ROOT_PASSWORD: object_storage_root_password
        entrypoint: sh
        command: -c 'mkdir -p /data/posthog /data/ducklake-dev /data/ai-blobs && minio server --address ":19000" --console-address ":19001" /data'
        ports:
            - '19000:19000'
            - '19001:19001'
        volumes:
            - objectstorage:/data

    seaweedfs:
        image: chrislusf/seaweedfs:4.03
        container_name: '${SEAWEEDFS_DOCKER_NAME:-seaweedfs-main}'
        restart: on-failure
        logging: *default-logging
        entrypoint:
            - /bin/sh
            - -c
            - |
                /usr/bin/weed "$$@" &
                WEED_PID=$$!
                echo "Waiting for SeaweedFS to initialize..."
                while true; do
                    sleep 5
                    echo "Checking if posthog bucket exists..."
                    if echo "s3.bucket.list" | /usr/bin/weed shell -master=localhost:9333 2>&1 | grep -q "posthog"; then
                        echo "Bucket posthog exists!"
                        break
                    fi
                    echo "Bucket not found, attempting to create..."
                    echo "s3.bucket.create -name posthog" | /usr/bin/weed shell -master=localhost:9333 2>&1 || true
                    echo "Retrying in 5s..."
                done
                echo "SeaweedFS ready with posthog bucket"
                wait $$WEED_PID
            - --
        command: ['server', '-s3', '-s3.port=8333', '-dir=/data']
        ports:
            - '127.0.0.1:8333:8333'
            - '127.0.0.1:9333:9333'
        healthcheck:
            test: ['CMD', 'sh', '-c', "echo 's3.bucket.list' | /usr/bin/weed shell -master=localhost:9333 2>&1 | grep -q posthog"]
            interval: 5s
            timeout: 10s
            retries: 30
            start_period: 10s
        volumes:
            - seaweedfs:/data

    # =========================================================================
    # PostHog — Python/Django
    # =========================================================================

    web:
        image: ${REGISTRY_URL:-posthog/posthog}:${POSTHOG_APP_TAG:-latest}
        restart: on-failure
        logging: *default-logging
        command: bash -c './bin/migrate && ./bin/docker-server'
        ports:
            - '8000:8000'
        environment:
            DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
            PGHOST: db
            PGUSER: posthog
            PGPASSWORD: posthog
            CLICKHOUSE_HOST: clickhouse
            CLICKHOUSE_DATABASE: posthog
            CLICKHOUSE_SECURE: 'false'
            CLICKHOUSE_VERIFY: 'false'
            CLICKHOUSE_API_USER: api
            CLICKHOUSE_API_PASSWORD: apipass
            CLICKHOUSE_APP_USER: app
            CLICKHOUSE_APP_PASSWORD: apppass
            REDIS_URL: redis://redis7:6379/
            KAFKA_HOSTS: kafka:9092
            OBJECT_STORAGE_ENDPOINT: http://objectstorage:19000
            OBJECT_STORAGE_PUBLIC_ENDPOINT: https://${DOMAIN}
            OBJECT_STORAGE_ACCESS_KEY_ID: object_storage_root_user
            OBJECT_STORAGE_SECRET_ACCESS_KEY: object_storage_root_password
            OBJECT_STORAGE_ENABLED: 'true'
            SESSION_RECORDING_V2_S3_ENDPOINT: http://seaweedfs:8333
            SESSION_RECORDING_V2_S3_ACCESS_KEY_ID: 'any'
            SESSION_RECORDING_V2_S3_SECRET_ACCESS_KEY: 'any'
            RECORDING_API_URL: http://recording-api:6738
            SITE_URL: ${SITE_URL:-https://${DOMAIN}}
            LIVESTREAM_HOST: https://${DOMAIN}/livestream
            SECRET_KEY: ${POSTHOG_SECRET}
            ENCRYPTION_SALT_KEYS: ${ENCRYPTION_SALT_KEYS}
            DEPLOYMENT: hobby
            IS_BEHIND_PROXY: 'true'
            DISABLE_SECURE_SSL_REDIRECT: 'true'
            SECURE_COOKIES: ${SECURE_COOKIES:-true}
            OPT_OUT_CAPTURE: ${OPT_OUT_CAPTURE:-false}
            USE_GRANIAN: 'true'
            GRANIAN_WORKERS: '2'
            OTEL_SERVICE_NAME: posthog
            OTEL_EXPORTER_OTLP_ENDPOINT: ''
            OTEL_SDK_DISABLED: 'true'
            CDP_API_URL: http://plugins:6738
            FLAGS_REDIS_ENABLED: 'false'
        depends_on:
            db:
                condition: service_healthy
            redis7:
                condition: service_healthy
            clickhouse:
                condition: service_healthy
            kafka:
                condition: service_healthy
            objectstorage:
                condition: service_started
            seaweedfs:
                condition: service_healthy

    worker:
        image: ${REGISTRY_URL:-posthog/posthog}:${POSTHOG_APP_TAG:-latest}
        restart: on-failure
        logging: *default-logging
        command: ./bin/docker-worker-celery --with-scheduler
        environment:
            DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
            PGHOST: db
            PGUSER: posthog
            PGPASSWORD: posthog
            CLICKHOUSE_HOST: clickhouse
            CLICKHOUSE_DATABASE: posthog
            CLICKHOUSE_SECURE: 'false'
            CLICKHOUSE_VERIFY: 'false'
            CLICKHOUSE_API_USER: api
            CLICKHOUSE_API_PASSWORD: apipass
            CLICKHOUSE_APP_USER: app
            CLICKHOUSE_APP_PASSWORD: apppass
            REDIS_URL: redis://redis7:6379/
            KAFKA_HOSTS: kafka:9092
            OBJECT_STORAGE_ENDPOINT: http://objectstorage:19000
            OBJECT_STORAGE_PUBLIC_ENDPOINT: https://${DOMAIN}
            OBJECT_STORAGE_ACCESS_KEY_ID: object_storage_root_user
            OBJECT_STORAGE_SECRET_ACCESS_KEY: object_storage_root_password
            OBJECT_STORAGE_ENABLED: 'true'
            SESSION_RECORDING_V2_S3_ENDPOINT: http://seaweedfs:8333
            SESSION_RECORDING_V2_S3_ACCESS_KEY_ID: 'any'
            SESSION_RECORDING_V2_S3_SECRET_ACCESS_KEY: 'any'
            RECORDING_API_URL: http://recording-api:6738
            SITE_URL: ${SITE_URL:-https://${DOMAIN}}
            SECRET_KEY: ${POSTHOG_SECRET}
            ENCRYPTION_SALT_KEYS: ${ENCRYPTION_SALT_KEYS}
            DEPLOYMENT: hobby
            IS_BEHIND_PROXY: 'true'
            DISABLE_SECURE_SSL_REDIRECT: 'true'
            CDP_API_URL: http://plugins:6738
            FLAGS_REDIS_ENABLED: 'false'
            OTEL_SDK_DISABLED: 'true'
            POSTHOG_SKIP_MIGRATION_CHECKS: '1'
        depends_on:
            db:
                condition: service_healthy
            redis7:
                condition: service_healthy
            clickhouse:
                condition: service_started
            kafka:
                condition: service_healthy
            web:
                condition: service_started

    asyncmigrationscheck:
        image: ${REGISTRY_URL:-posthog/posthog}:${POSTHOG_APP_TAG:-latest}
        restart: 'no'
        logging: *default-logging
        command: python manage.py run_async_migrations --check
        deploy:
            replicas: 0
        environment:
            DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
            PGHOST: db
            PGUSER: posthog
            PGPASSWORD: posthog
            CLICKHOUSE_HOST: clickhouse
            CLICKHOUSE_DATABASE: posthog
            CLICKHOUSE_SECURE: 'false'
            CLICKHOUSE_VERIFY: 'false'
            REDIS_URL: redis://redis7:6379/
            KAFKA_HOSTS: kafka:9092
            SITE_URL: ${SITE_URL:-https://${DOMAIN}}
            SECRET_KEY: ${POSTHOG_SECRET}
            DEPLOYMENT: hobby
            SKIP_ASYNC_MIGRATIONS_SETUP: 0
            OTEL_SDK_DISABLED: 'true'

    # =========================================================================
    # PostHog — Node.js
    # =========================================================================

    plugins:
        image: ${REGISTRY_URL:-posthog/posthog}-node:${POSTHOG_NODE_TAG:-latest}
        restart: on-failure
        logging: *default-logging
        command: node nodejs/dist/index.js
        environment:
            DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
            PERSONS_DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
            BEHAVIORAL_COHORTS_DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
            KAFKA_HOSTS: kafka:9092
            REDIS_URL: redis://redis7:6379/
            CLICKHOUSE_HOST: clickhouse
            CLICKHOUSE_DATABASE: posthog
            CLICKHOUSE_SECURE: 'false'
            CLICKHOUSE_VERIFY: 'false'
            SITE_URL: ${SITE_URL:-https://${DOMAIN}}
            SECRET_KEY: ${POSTHOG_SECRET}
            OBJECT_STORAGE_ACCESS_KEY_ID: object_storage_root_user
            OBJECT_STORAGE_SECRET_ACCESS_KEY: object_storage_root_password
            OBJECT_STORAGE_ENDPOINT: http://objectstorage:19000
            OBJECT_STORAGE_PUBLIC_ENDPOINT: https://${DOMAIN}
            OBJECT_STORAGE_ENABLED: 'true'
            CDP_REDIS_HOST: redis7
            CDP_REDIS_PORT: 6379
            LOGS_REDIS_HOST: redis7
            LOGS_REDIS_PORT: 6379
            LOGS_REDIS_TLS: 'false'
            TRACES_REDIS_HOST: redis7
            TRACES_REDIS_PORT: 6379
            TRACES_REDIS_TLS: 'false'
            ENCRYPTION_SALT_KEYS: ${ENCRYPTION_SALT_KEYS}
            CYCLOTRON_DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
            OTEL_EXPORTER_OTLP_ENDPOINT: ''
        volumes:
            - share:/share
        depends_on:
            - db
            - redis7
            - clickhouse
            - kafka
            - objectstorage
            - seaweedfs

    ingestion-general:
        image: ${REGISTRY_URL:-posthog/posthog}-node:${POSTHOG_NODE_TAG:-latest}
        restart: on-failure
        logging: *default-logging
        command: node nodejs/dist/index.js
        environment:
            PLUGIN_SERVER_MODE: ingestion-v2-combined
            DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
            PERSONS_DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
            BEHAVIORAL_COHORTS_DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
            KAFKA_HOSTS: kafka:9092
            REDIS_URL: redis://redis7:6379/
            CLICKHOUSE_HOST: clickhouse
            CLICKHOUSE_DATABASE: posthog
            CLICKHOUSE_SECURE: 'false'
            CLICKHOUSE_VERIFY: 'false'
            COOKIELESS_REDIS_HOST: redis7
            COOKIELESS_REDIS_PORT: 6379
            CDP_REDIS_HOST: redis7
            ENCRYPTION_SALT_KEYS: ${ENCRYPTION_SALT_KEYS}
        depends_on:
            - db
            - redis7
            - clickhouse
            - kafka

    ingestion-sessionreplay:
        image: ${REGISTRY_URL:-posthog/posthog}-node:${POSTHOG_NODE_TAG:-latest}
        restart: on-failure
        logging: *default-logging
        command: node nodejs/dist/index.js
        environment:
            PLUGIN_SERVER_MODE: recordings-blob-ingestion-v2
            DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
            KAFKA_HOSTS: kafka:9092
            REDIS_URL: redis://redis7:6379/
            SESSION_RECORDING_V2_S3_ACCESS_KEY_ID: 'any'
            SESSION_RECORDING_V2_S3_SECRET_ACCESS_KEY: 'any'
            SESSION_RECORDING_V2_S3_TIMEOUT_MS: 120000
            SESSION_RECORDING_V2_S3_ENDPOINT: http://seaweedfs:8333
            ENCRYPTION_SALT_KEYS: ${ENCRYPTION_SALT_KEYS}
        depends_on:
            - db
            - redis7
            - kafka
            - seaweedfs

    recording-api:
        image: ${REGISTRY_URL:-posthog/posthog}-node:${POSTHOG_NODE_TAG:-latest}
        restart: on-failure
        logging: *default-logging
        command: node nodejs/dist/index.js
        environment:
            PLUGIN_SERVER_MODE: recording-api
            DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
            REDIS_URL: redis://redis7:6379/
            CLICKHOUSE_HOST: clickhouse
            CLICKHOUSE_DATABASE: posthog
            CLICKHOUSE_SECURE: 'false'
            CLICKHOUSE_VERIFY: 'false'
            SESSION_RECORDING_API_REDIS_HOST: redis7
            SESSION_RECORDING_API_REDIS_PORT: 6379
            ENCRYPTION_SALT_KEYS: ${ENCRYPTION_SALT_KEYS}
        depends_on:
            - db
            - redis7
            - clickhouse

    ingestion-error-tracking:
        image: ${REGISTRY_URL:-posthog/posthog}-node:${POSTHOG_NODE_TAG:-latest}
        restart: on-failure
        logging: *default-logging
        command: node nodejs/dist/index.js
        environment:
            PLUGIN_SERVER_MODE: ingestion-errortracking
            DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
            PERSONS_DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
            KAFKA_HOSTS: kafka:9092
            REDIS_URL: redis://redis7:6379/
            CDP_REDIS_HOST: redis7
            ENCRYPTION_SALT_KEYS: ${ENCRYPTION_SALT_KEYS}
        depends_on:
            - db
            - redis7
            - kafka

    ingestion-logs:
        image: ${REGISTRY_URL:-posthog/posthog}-node:${POSTHOG_NODE_TAG:-latest}
        restart: on-failure
        logging: *default-logging
        command: node nodejs/dist/index.js
        environment:
            PLUGIN_SERVER_MODE: ingestion-logs
            DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
            KAFKA_HOSTS: kafka:9092
            REDIS_URL: redis://redis7:6379/
            LOGS_REDIS_HOST: redis7
            LOGS_REDIS_TLS: 'false'
        depends_on:
            - db
            - redis7
            - kafka

    ingestion-traces:
        image: ${REGISTRY_URL:-posthog/posthog}-node:${POSTHOG_NODE_TAG:-latest}
        restart: on-failure
        logging: *default-logging
        command: node nodejs/dist/index.js
        environment:
            PLUGIN_SERVER_MODE: ingestion-traces
            DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
            KAFKA_HOSTS: kafka:9092
            REDIS_URL: redis://redis7:6379/
            TRACES_REDIS_HOST: redis7
            TRACES_REDIS_TLS: 'false'
        depends_on:
            - db
            - redis7
            - kafka

    # =========================================================================
    # PostHog — Rust / Go
    # =========================================================================

    capture:
        image: ghcr.io/posthog/posthog/capture:master
        restart: on-failure
        logging: *default-logging
        environment:
            ADDRESS: '0.0.0.0:3000'
            KAFKA_TOPIC: events_plugin_ingestion
            KAFKA_HOSTS: kafka:9092
            REDIS_URL: redis://redis7:6379/
            CAPTURE_MODE: events
            RUST_LOG: info,rdkafka=warn

    replay-capture:
        image: ghcr.io/posthog/posthog/capture:master
        restart: on-failure
        logging: *default-logging
        environment:
            ADDRESS: '0.0.0.0:3000'
            KAFKA_TOPIC: session_recording_snapshot_item_events
            KAFKA_HOSTS: kafka:9092
            REDIS_URL: redis://redis7:6379/
            CAPTURE_MODE: recordings

    feature-flags:
        image: ghcr.io/posthog/posthog/feature-flags:master
        restart: on-failure
        logging: *default-logging
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:3001/_readiness']
            interval: 5s
            timeout: 5s
            retries: 12
            start_period: 10s
        environment:
            WRITE_DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
            READ_DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
            PERSONS_WRITE_DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
            PERSONS_READ_DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
            MAXMIND_DB_PATH: /share/GeoLite2-City.mmdb
            REDIS_URL: redis://redis7:6379/
            ADDRESS: '0.0.0.0:3001'
            RUST_LOG: info
            COOKIELESS_REDIS_HOST: redis7
            COOKIELESS_REDIS_PORT: 6379
        volumes:
            - share:/share
        depends_on:
            - db
            - redis7

    property-defs-rs:
        image: ghcr.io/posthog/posthog/property-defs-rs:master
        restart: on-failure
        logging: *default-logging
        environment:
            DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
            KAFKA_HOSTS: kafka:9092
            SKIP_WRITES: 'false'
            SKIP_READS: 'false'
            FILTER_MODE: opt-out
        depends_on:
            kafka-init:
                condition: service_completed_successfully
            db:
                condition: service_healthy

    cyclotron-janitor:
        image: ghcr.io/posthog/posthog/cyclotron-janitor:master
        restart: on-failure
        logging: *default-logging
        environment:
            DATABASE_URL: postgres://posthog:posthog@db:5432/cyclotron
            KAFKA_HOSTS: kafka:9092
        depends_on:
            db:
                condition: service_healthy
            kafka:
                condition: service_started

    cymbal:
        image: ghcr.io/posthog/posthog/cymbal:master
        restart: on-failure
        logging: *default-logging
        environment:
            KAFKA_HOSTS: kafka:9092
            OBJECT_STORAGE_BUCKET: posthog
            OBJECT_STORAGE_ACCESS_KEY_ID: 'any'
            OBJECT_STORAGE_SECRET_ACCESS_KEY: 'any'
            OBJECT_STORAGE_ENDPOINT: http://seaweedfs:8333
            OBJECT_STORAGE_FORCE_PATH_STYLE: 'true'
            BIND_HOST: '0.0.0.0'
            BIND_PORT: '3302'
            DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
            PERSONS_URL: postgres://posthog:posthog@db:5432/posthog
            MAXMIND_DB_PATH: /share/GeoLite2-City.mmdb
            REDIS_URL: redis://redis7:6379/
            ISSUE_BUCKETS_REDIS_URL: redis://redis7:6379/
            RUST_LOG: info
        volumes:
            - share:/share
        depends_on:
            kafka-init:
                condition: service_completed_successfully
            seaweedfs:
                condition: service_healthy
            db:
                condition: service_healthy
            redis7:
                condition: service_healthy

    livestream:
        image: ghcr.io/posthog/posthog/livestream:master
        restart: on-failure
        logging: *default-logging
        environment:
            LIVESTREAM_JWT_SECRET: ${POSTHOG_SECRET}
        volumes:
            - ./posthog/docker/livestream/configs-hobby.yml:/configs/configs.yml:ro
        depends_on:
            kafka:
                condition: service_started

    # =========================================================================
    # Temporal
    # =========================================================================

    elasticsearch:
        image: elasticsearch:7.17.28
        logging: *default-logging
        environment:
            - cluster.routing.allocation.disk.threshold_enabled=true
            - cluster.routing.allocation.disk.watermark.low=512mb
            - cluster.routing.allocation.disk.watermark.high=256mb
            - cluster.routing.allocation.disk.watermark.flood_stage=128mb
            - discovery.type=single-node
            - ES_JAVA_OPTS=-Xms256m -Xmx256m
            - xpack.security.enabled=false
        healthcheck:
            test: ['CMD-SHELL', 'curl -s http://localhost:9200/_cluster/health | grep -qE "\"status\":\"(green|yellow)\""']
            interval: 10s
            timeout: 10s
            retries: 30
            start_period: 60s
        expose:
            - 9200
        volumes:
            - /var/lib/elasticsearch/data

    temporal:
        image: temporalio/auto-setup:1.26.2
        restart: on-failure
        logging: *default-logging
        healthcheck:
            test: ['CMD-SHELL', 'nc -z $(hostname) 7233']
            interval: 5s
            timeout: 5s
            retries: 30
            start_period: 300s
        environment:
            - DB=postgres12
            - DB_PORT=5432
            - POSTGRES_USER=posthog
            - POSTGRES_PWD=posthog
            - POSTGRES_SEEDS=db
            - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
            - ENABLE_ES=false
        ports:
            - 7233:7233
        volumes:
            - ./posthog/docker/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
        depends_on:
            db:
                condition: service_healthy
            elasticsearch:
                condition: service_healthy

    temporal-admin-tools:
        image: temporalio/admin-tools:1.26.2
        logging: *default-logging
        environment:
            - TEMPORAL_CLI_ADDRESS=temporal:7233
        stdin_open: true
        tty: true
        depends_on:
            - temporal

    temporal-ui:
        image: temporalio/ui:2.47.2
        logging: *default-logging
        environment:
            - TEMPORAL_ADDRESS=temporal:7233
            - TEMPORAL_CORS_ORIGINS=http://localhost:3000
            - TEMPORAL_CSRF_COOKIE_INSECURE=true
            - TEMPORAL_CODEC_ENDPOINT=http://localhost:8000
        ports:
            - 8081:8080
        depends_on:
            temporal:
                condition: service_started
            db:
                condition: service_healthy

    temporal-django-worker:
        image: ${REGISTRY_URL:-posthog/posthog}:${POSTHOG_APP_TAG:-latest}
        restart: on-failure
        logging: *default-logging
        command: ./bin/temporal-django-worker
        environment:
            DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
            PGHOST: db
            PGUSER: posthog
            PGPASSWORD: posthog
            CLICKHOUSE_HOST: clickhouse
            CLICKHOUSE_DATABASE: posthog
            CLICKHOUSE_SECURE: 'false'
            CLICKHOUSE_VERIFY: 'false'
            REDIS_URL: redis://redis7:6379/
            KAFKA_HOSTS: kafka:9092
            SITE_URL: ${SITE_URL:-https://${DOMAIN}}
            SECRET_KEY: ${POSTHOG_SECRET}
            DEPLOYMENT: hobby
            OTEL_SDK_DISABLED: 'true'
            CDP_API_URL: http://plugins:6738
            FLAGS_REDIS_ENABLED: 'false'
            TEMPORAL_HOST: temporal
        depends_on:
            - db
            - redis7
            - clickhouse
            - kafka
            - objectstorage
            - seaweedfs
            - temporal

    # =========================================================================
    # Init / utility
    # =========================================================================

    kafka-init:
        image: docker.redpanda.com/redpandadata/redpanda:v25.1.9
        logging: *default-logging
        entrypoint: /bin/sh
        command:
            - -c
            - |
                set -x
                echo "Waiting for Kafka broker..."
                TIMEOUT=60; ELAPSED=0
                until rpk topic list --brokers kafka:9092 2>/dev/null; do
                    echo "Not ready ($${ELAPSED}s)..."; sleep 2; ELAPSED=$$((ELAPSED + 2))
                    [ $$ELAPSED -ge $$TIMEOUT ] && echo "Timeout" && exit 1
                done
                for topic in clickhouse_events_json; do
                    rpk topic create "$$topic" --brokers kafka:9092 -p 1 -r 1 2>&1 ||
                        rpk topic list --brokers kafka:9092 | grep -q "$$topic" || exit 1
                done
                rpk topic list --brokers kafka:9092
        depends_on:
            kafka:
                condition: service_healthy

    geoip-init:
        image: alpine:3.20
        command:
            - sh
            - -c
            - |
                [ -f /share/GeoLite2-City.mmdb ] && echo "GeoIP exists" && exit 0
                apk add --no-cache curl brotli
                curl -L "https://mmdbcdn.posthog.net/" --http1.1 | brotli --decompress > /share/GeoLite2-City.mmdb
        volumes:
            - share:/share

volumes:
    postgres-data:
    redis7-data:
    clickhouse-data:
    zookeeper-data:
    zookeeper-datalog:
    zookeeper-logs:
    kafka-data:
    objectstorage:
    seaweedfs:
    share:
